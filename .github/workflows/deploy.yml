name: Deploy Backend

on:
  push:
    branches:
      - main
      - autoDeployTest
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: |
          cd src
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o my-vocabulary-book_backend .

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp src/my-vocabulary-book_backend deploy/
          cp appspec.yml deploy/
          cp -r scripts/ deploy/
          cd deploy && zip -r ../deployment.zip .

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_BACKEND }}
          aws-region: ap-northeast-1

      - name: Upload to S3
        run: |
          aws s3 cp deployment.zip \
            s3://${{ secrets.CODEDEPLOY_BUCKET }}/mvb-backend-${{ github.sha }}.zip

      - name: Create CodeDeploy deployment
        run: |
          aws deploy create-deployment \
            --application-name ${{ secrets.CODEDEPLOY_APP }} \
            --deployment-group-name ${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP }} \
            --s3-location bucket=${{ secrets.CODEDEPLOY_BUCKET }},key=mvb-backend-${{ github.sha }}.zip,bundleType=zip \
            --description "Deploy from GitHub Actions: ${{ github.sha }}"
