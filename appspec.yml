version: 0.0
os: linux
files:
  - source: my-vocabulary-book_backend
    destination: /opt/my-vocabulary-book/
hooks:
  ApplicationStop:
    - location: scripts/stop_app.sh
      timeout: 30
      runas: root
  AfterInstall:
    - location: scripts/setup.sh
      timeout: 30
      runas: root
  ApplicationStart:
    - location: scripts/start_app.sh
      timeout: 30
      runas: root
  ValidateService:
    - location: scripts/validate.sh
      timeout: 30
      runas: root
